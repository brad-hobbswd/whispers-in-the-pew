<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Store | Whispers in the Pew</title>
  <meta name="description" content="Store page for Whispers in the Pew by Bradley Hobbs.">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.ico">
</head>
<body>

<div id="header"></div>

<section class="hero-small">
  <div class="hero-inner">
    <h1 class="h1">Store</h1>
    <p class="tagline">Whispers in the Pew will be available soon.</p>
  </div>
</section>

<main class="container">
  <div class="grid">
    <section class="panel">
      <div class="store-grid">

        <div class="store-cover">
          <img class="store-cover-img" src="assets/images/whispersinthepewbookcover.jpeg" alt="Whispers in the Pew book cover">
        </div>

        <div class="store-details">
          <h2 class="store-title">Whispers in the Pew</h2>
          <p class="store-note">Amazon listing and pricing will appear here soon.</p>

          <div class="store-badges">
            <span class="store-badge">Coming Soon</span>
            <span class="store-badge">Amazon</span>
          </div>

          <div class="store-actions">
            <a class="btn" href="#" aria-disabled="true">Amazon link coming soon</a>
          </div>

          <p class="store-fineprint">Bookmark this page for launch day.</p>
        </div>

      </div>
    </section>
  </div>
</main>

<div id="footer"></div>

<script src="/whispers-in-the-pew/script.js"></script>
  
</body>
</html>
